مثال: RTL / محاذاة / توزيع الأعمدة/الـ pagination (خصوصًا حوالين .filmlane-prosemirror-root و/أو .ProseMirror).
سلوك إدخال/اختصارات
مثال: Enter بين character و dialogue أو انتقالات تلقائية بين الفورمات.
